<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Dashboard</title>
    
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-XXXXXXXXXX');
    </script>
    
    <!-- SheetJS for Excel reading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Chart.js for visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1b2a;
            color: white;
            overflow: hidden;
        }

        .layout {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* Sidebar Styles */
        .sidebar {
            background: #1b263b;
            padding: 15px 10px;
            width: 280px;
            overflow-y: auto;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .sidebar.collapsed {
            width: 0;
            padding: 0;
            overflow: hidden;
        }

        .toggle-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            z-index: 1000;
            transition: all 0.2s ease;
        }

        .toggle-btn:hover {
            background: #0056b3;
        }

        .sidebar-header {
            font-size: 13px;
            font-weight: bold;
            color: #ff9800;
            margin: 10px 0 8px 0;
        }

        .toggle-radio {
            display: flex;
            gap: 0;
            margin: 8px 0 12px 0;
        }

        .toggle-radio label {
            font-size: 11px;
            padding: 6px 16px;
            margin: 0;
            border: 1px solid #007bff;
            cursor: pointer;
            background-color: #1b263b;
            color: #e9ecef;
            transition: all 0.2s ease;
            text-align: center;
            flex: 1;
        }

        .toggle-radio label:first-of-type {
            border-radius: 4px 0 0 4px;
        }

        .toggle-radio label:not(:first-of-type) {
            border-left: none;
        }

        .toggle-radio label:last-of-type {
            border-radius: 0 4px 4px 0;
        }

        .toggle-radio label:hover {
            background-color: #2c3e50;
        }

        .toggle-radio input[type="radio"] {
            display: none;
        }

        .toggle-radio input[type="radio"]:checked + label {
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }

        .items-container {
            overflow-y: auto;
            max-height: 60vh;
            margin-bottom: 10px;
        }

        .sidebar-link {
            display: block;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 11px;
            color: #e9ecef;
            border-radius: 3px;
            margin: 1px 0;
            transition: all 0.2s ease;
        }

        .sidebar-link:hover {
            background: #007bff;
            color: white;
        }

        .sidebar-link.active {
            background: #007bff;
            color: white;
            font-weight: bold;
        }

        .download-section {
            border-top: 1px solid #495057;
            padding-top: 10px;
            margin-top: 10px;
            text-align: center;
        }

        .download-link {
            display: inline-block;
            padding: 8px 16px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            transition: background-color 0.2s ease;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .download-link:hover {
            background-color: #218838;
        }

        .file-upload-section {
            border-top: 1px solid #495057;
            padding-top: 10px;
            margin-top: 10px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }

        .file-input-label:hover {
            background-color: #0056b3;
        }

        .file-status {
            font-size: 10px;
            color: #6c757d;
            margin-top: 5px;
            text-align: center;
        }

        /* Content Area */
        .content {
            flex: 1;
            background-color: #0d1b2a;
            overflow-y: auto;
            padding: 20px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 16px;
            color: #e9ecef;
        }

        /* Chart Grid */
        .chart-grid {
            display: grid;
            gap: 20px;
        }

        .chart-row {
            display: grid;
            gap: 15px;
        }

        .chart-row-2 {
            grid-template-columns: 60% 1fr;
            align-items: stretch;
        }

        .chart-row-1 {
            grid-template-columns: 1fr;
        }

        .chart-row-even {
            grid-template-columns: 1fr 1fr;
        }

        .chart-container {
            background: #1b263b;
            border: 2px solid #007bff;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 400px;
        }

        .chart-title {
            font-size: 16px;
            font-weight: bold;
            color: #ff9800;
            margin-bottom: 10px;
            text-align: center;
        }

        .chart-wrapper {
            flex: 1;
            position: relative;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* Make Top 10 charts clickable */
        #chartTopItems, #chartTopStock {
            cursor: pointer;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1b263b;
        }

        ::-webkit-scrollbar-thumb {
            background: #495057;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #6c757d;
        }

        /* Chart Indicator Styles */
        .chart-indicator {
            position: absolute;
            top: 45px;
            right: 15px;
            background: rgba(27, 38, 59, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 10px;
            min-width: 250px;
            z-index: 10;
        }

        .indicator-title {
            font-size: 11px;
            color: #ff9800;
            font-weight: bold;
            margin-bottom: 6px;
            text-align: center;
        }

        .indicator-bar-container {
            display: flex;
            width: 100%;
            height: 30px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .indicator-bar-segment {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
        }

        .indicator-top10 {
            background: linear-gradient(90deg, #2ecc71 0%, #27ae60 100%);
        }

        .chart-container:has(#chartTopStock) .indicator-top10 {
            background: linear-gradient(90deg, #3498db 0%, #2980b9 100%);
        }

        .indicator-rest {
            background: linear-gradient(90deg, #95a5a6 0%, #7f8c8d 100%);
        }

        .indicator-text {
            font-size: 10px;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            white-space: nowrap;
        }

        .indicator-legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            color: white;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            display: inline-block;
        }

        /* AI Analysis Section */
        .ai-analysis-section {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border: 2px solid #4a90e2;
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }

        .ai-analysis-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .ai-icon {
            font-size: 28px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .ai-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .ai-analysis-content {
            color: #e8f4f8;
            line-height: 1.8;
            font-size: 14px;
        }

        .analysis-loading {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
        }

        .insight-section {
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #4a90e2;
            padding: 12px 15px;
            margin: 12px 0;
            border-radius: 6px;
        }

        .insight-title {
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 8px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .insight-text {
            margin-bottom: 8px;
            color: #e8f4f8;
        }

        .insight-recommendation {
            background: rgba(255, 193, 7, 0.15);
            border-left: 3px solid #ffc107;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            font-style: italic;
        }

        .insight-recommendation::before {
            content: "💡 Recommendation: ";
            font-weight: bold;
            color: #ffc107;
        }

        .item-list {
            margin: 8px 0;
            padding-left: 20px;
        }

        .item-list-item {
            margin: 4px 0;
            color: #fff;
        }

        .highlight-number {
            font-weight: bold;
            color: #4af;
            font-size: 16px;
        }

        .highlight-critical {
            font-weight: bold;
            color: #ff6b6b;
        }

        .highlight-success {
            font-weight: bold;
            color: #51cf66;
        }
        
        /* Sample Data Banner */
        .sample-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            border: 2px solid #60a5fa;
            border-radius: 15px;
            padding: 30px 50px;
            z-index: 10000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 600px;
            width: 90%;
            opacity: 0;
            display: none;
            transition: opacity 1.5s ease-out;
        }
        
        @media (min-width: 768px) {
            .sample-banner {
                left: calc(50% + 140px);
            }
        }
        
        .sample-banner.show {
            opacity: 1;
            display: block;
        }
        
        .sample-banner.fade-out {
            opacity: 0;
        }
        
        .sample-banner-close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            color: #93c5fd;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px 10px;
            line-height: 1;
            transition: color 0.2s, transform 0.2s;
        }
        
        .sample-banner-close:hover {
            color: #ffffff;
            transform: scale(1.1);
        }
        
        .sample-banner-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: #3b82f6;
        }
        
        .sample-banner-title {
            font-size: 28px;
            font-weight: bold;
            color: #93c5fd;
            margin-bottom: 15px;
        }
        
        .sample-banner-text {
            font-size: 16px;
            color: #e0e7ff;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- Sample Data Banner -->
    <div class="sample-banner" id="sampleBanner">
        <button class="sample-banner-close" onclick="closeSampleBanner()">✕</button>
        <div class="sample-banner-icon">ℹ️</div>
        <div class="sample-banner-title">Sample Data</div>
        <div class="sample-banner-text">
            This visualization is for demo purposes only.<br>
            Upload your own data file in the sidebar to visualize your Inventory.
        </div>
    </div>
    
    <div class="layout">
        <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
        
        <div class="sidebar" id="sidebar">
            <h5 class="sidebar-header">Upload Data</h5>
            <div class="file-upload-section">
                <div class="file-input-wrapper">
                    <input type="file" id="excelFile" accept=".xlsx,.xls" onchange="handleFileUpload(event)">
                    <label for="excelFile" class="file-input-label">📁 Upload Excel File</label>
                </div>
                <div class="file-status" id="fileStatus">No file loaded</div>
            </div>

            <h5 class="sidebar-header">Item</h5>
            <div class="toggle-radio">
                <input type="radio" name="itemType" id="itemCode" value="code" checked>
                <label for="itemCode">Item Code</label>
                <input type="radio" name="itemType" id="itemName" value="name">
                <label for="itemName">Item Name</label>
            </div>

            <div class="items-container" id="itemsContainer">
                <div class="sidebar-link">Load Excel file to see items</div>
            </div>

            <div class="download-section">
                <button class="download-link" onclick="downloadExcelFile()">📥 Download Stock History</button>
            </div>
        </div>

        <div class="content" id="mainContent">
            <div class="loading">
                Upload an Excel file to begin
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let rawData = [];
        let processedData = [];
        let currentItem = "All Item Code";
        let currentItemType = "code";
        let sidebarCollapsed = false;

        // Excel file name (hidden in JavaScript)
        const EXCEL_FILE_NAME = "In-Out-Stock-History-sample.xlsx";
        const INITIAL_DATA_FILE = "chart_data.xlsx";
        
        // Auto-load initial data on page load
        window.addEventListener('DOMContentLoaded', function() {
            loadInitialData();
        });
        
        // Load initial data function
        function loadInitialData() {
            const fileStatus = document.getElementById('fileStatus');
            fileStatus.textContent = 'Loading initial data...';
            
            fetch(INITIAL_DATA_FILE)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Initial data file not found');
                    }
                    return response.arrayBuffer();
                })
                .then(data => {
                    try {
                        const workbook = XLSX.read(data, { type: 'array' });
                        
                        // Read first sheet
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        rawData = XLSX.utils.sheet_to_json(firstSheet);
                        
                        processData();
                        populateItemsList();
                        updateDashboard();
                        
                        fileStatus.textContent = `✓ chart_data.xlsx (${rawData.length} rows)`;
                    } catch (error) {
                        console.error('Error processing initial data:', error);
                        fileStatus.textContent = '✗ Error loading initial data';
                    }
                })
                .catch(error => {
                    console.error('Initial data load error:', error);
                    fileStatus.textContent = 'No initial data - Please upload Excel file';
                });
        }
        
        // Download function
        function downloadExcelFile() {
            // Fetch the file and trigger download
            fetch(EXCEL_FILE_NAME)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('File not found');
                    }
                    return response.blob();
                })
                .then(blob => {
                    // Create download link
                    const link = document.createElement('a');
                    const url = URL.createObjectURL(blob);
                    link.href = url;
                    link.download = "In-Out-Stock-History-Sample.xlsx";
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                })
                .catch(error => {
                    alert('Download file not found. Please make sure the Excel file is uploaded to the server.');
                    console.error('Download error:', error);
                });
        }

        // Vertical crosshair plugin for line charts
        const crosshairPlugin = {
            id: 'crosshair',
            afterDraw: (chart) => {
                if (chart.tooltip?._active?.length) {
                    const ctx = chart.ctx;
                    const activePoint = chart.tooltip._active[0];
                    const x = activePoint.element.x;
                    const topY = chart.scales.y.top;
                    const bottomY = chart.scales.y.bottom;

                    // Draw vertical line
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(x, topY);
                    ctx.lineTo(x, bottomY);
                    ctx.lineWidth = 1;
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.setLineDash([5, 5]);
                    ctx.stroke();
                    ctx.restore();
                }
            }
        };

        // Register the plugin
        Chart.register(crosshairPlugin);

        // Toggle sidebar
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebarCollapsed = !sidebarCollapsed;
            sidebar.classList.toggle('collapsed', sidebarCollapsed);
        }

        // Handle file upload
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // Hide sample data banner immediately when user uploads their own file
            const banner = document.getElementById('sampleBanner');
            if (banner) {
                banner.style.display = 'none';
            }

            const fileStatus = document.getElementById('fileStatus');
            fileStatus.textContent = 'Loading...';

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    
                    // Read first sheet
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    rawData = XLSX.utils.sheet_to_json(firstSheet);
                    
                    processData();
                    populateItemsList();
                    updateDashboard();
                    
                    fileStatus.textContent = `✓ ${file.name} (${rawData.length} rows)`;
                    
                    // Track file load event
                    if (typeof gtag !== 'undefined') {
                        gtag('event', 'file_loaded', {
                            'event_category': 'data_management',
                            'event_label': file.name,
                            'value': rawData.length,
                            'file_size_kb': Math.round(file.size / 1024),
                            'file_type': file.name.split('.').pop()
                        });
                    }
                } catch (error) {
                    console.error('Error reading file:', error);
                    fileStatus.textContent = '✗ Error reading file';
                    
                    // Track error
                    if (typeof gtag !== 'undefined') {
                        gtag('event', 'file_load_error', {
                            'event_category': 'errors',
                            'event_label': error.message
                        });
                    }
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // Process raw data
        function processData() {
            processedData = rawData.map(row => {
                const date = parseDate(row['Operation Date']);
                return {
                    itemCode: row['Item Code'],
                    itemName: row['Item Name'],
                    ownerCode: row['Owner Code'],
                    category: row['Rcv So Flag'], // In/Out/Stock
                    qty: parseFloat(row['Inventory Qty']) || 0,
                    date: date,
                    year: date ? date.getFullYear() : null,
                    month: date ? formatMonth(date) : null,
                    week: date ? formatWeek(date) : null
                };
            }).filter(row => row.date !== null);
            
            // Apply forward fill to Stock data
            processedData = forwardFillStockData(processedData);
        }
        
        // Forward fill Stock data - fills in missing dates with last known stock value
        function forwardFillStockData(data) {
            // Separate Stock data from In/Out data
            const stockData = data.filter(row => row.category === 'Stock');
            const inOutData = data.filter(row => row.category !== 'Stock');
            
            if (stockData.length === 0) return data;
            
            // Find global max date across ALL data
            const allDates = data.map(row => row.date);
            const globalMaxDate = new Date(Math.max(...allDates));
            
            // Group stock by item
            const itemGroups = {};
            stockData.forEach(row => {
                const itemKey = `${row.ownerCode}_${row.itemCode}`;
                if (!itemGroups[itemKey]) {
                    itemGroups[itemKey] = [];
                }
                itemGroups[itemKey].push(row);
            });
            
            // Forward fill each item to global max date
            const filledStockData = [];
            Object.values(itemGroups).forEach(itemStock => {
                // Sort by date
                itemStock.sort((a, b) => a.date - b.date);
                
                const firstDate = itemStock[0].date;
                const lastDate = globalMaxDate; // Use global max date instead of item's last date
                
                // Create map of existing dates
                const stockMap = new Map();
                itemStock.forEach(row => {
                    const dateKey = row.date.toISOString().split('T')[0];
                    stockMap.set(dateKey, row);
                });
                
                // Fill in all dates from first transaction to global max date
                const currentDate = new Date(firstDate);
                let lastStockValue = 0;
                
                while (currentDate <= lastDate) {
                    const dateKey = currentDate.toISOString().split('T')[0];
                    
                    if (stockMap.has(dateKey)) {
                        const existingRow = stockMap.get(dateKey);
                        lastStockValue = existingRow.qty;
                        filledStockData.push(existingRow);
                    } else {
                        // Create filled row with last known stock value
                        const template = itemStock[0];
                        const filledDate = new Date(currentDate);
                        filledStockData.push({
                            itemCode: template.itemCode,
                            itemName: template.itemName,
                            ownerCode: template.ownerCode,
                            category: 'Stock',
                            qty: lastStockValue,
                            date: filledDate,
                            year: filledDate.getFullYear(),
                            month: formatMonth(filledDate),
                            week: formatWeek(filledDate)
                        });
                    }
                    
                    // Move to next day
                    currentDate.setDate(currentDate.getDate() + 1);
                }
            });
            
            // Combine In/Out with filled Stock data
            return [...inOutData, ...filledStockData];
        }

        // Parse date from Excel serial or string
        function parseDate(dateValue) {
            if (!dateValue) return null;
            
            // If it's an Excel serial number
            if (typeof dateValue === 'number') {
                const excelEpoch = new Date(1899, 11, 30);
                return new Date(excelEpoch.getTime() + dateValue * 24 * 60 * 60 * 1000);
            }
            
            // Try parsing as string
            const parsed = new Date(dateValue);
            return isNaN(parsed) ? null : parsed;
        }

        // Format date to YYYY-MM
        function formatMonth(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
        }

        // Format date to week
        function formatWeek(date) {
            const year = date.getFullYear();
            const week = getWeekNumber(date);
            return `${year}-W${String(week).padStart(2, '0')}`;
        }

        // Get ISO week number
        function getWeekNumber(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        // Chart 3: Daily Stock
        function createDailyStockChart(data, displayName) {
            if (data.length === 0) return;

            let aggregatedData;
            
            if (currentItem === 'All Item Code' || currentItem === 'All Item Name') {
                // Sum by date for all items
                const grouped = {};
                data.forEach(row => {
                    const dateKey = row.date.toISOString().split('T')[0];
                    if (!grouped[dateKey]) {
                        grouped[dateKey] = { date: new Date(dateKey), qty: 0 };
                    }
                    grouped[dateKey].qty += row.qty;
                });
                aggregatedData = Object.values(grouped).sort((a, b) => a.date - b.date);
            } else {
                // Just sort for individual item
                aggregatedData = [...data].sort((a, b) => a.date - b.date);
            }

            if (aggregatedData.length === 0) return;

            // Create complete time series by filling missing dates
            const minDate = new Date(aggregatedData[0].date);
            const maxDate = new Date(aggregatedData[aggregatedData.length - 1].date);
            
            // Create a map for quick lookup
            const dataMap = {};
            aggregatedData.forEach(d => {
                const dateKey = d.date.toISOString().split('T')[0];
                dataMap[dateKey] = d.qty;
            });

            // Generate all dates between min and max
            const completeDates = [];
            const completeValues = [];
            let currentDate = new Date(minDate);
            let lastValue = 0;

            while (currentDate <= maxDate) {
                const dateKey = currentDate.toISOString().split('T')[0];
                completeDates.push(dateKey);
                
                // If we have data for this date, use it; otherwise use last known value (forward fill)
                if (dataMap[dateKey] !== undefined) {
                    lastValue = dataMap[dateKey];
                    completeValues.push(lastValue);
                } else {
                    completeValues.push(lastValue);
                }
                
                // Move to next day
                currentDate.setDate(currentDate.getDate() + 1);
            }

            new Chart(document.getElementById('chartDailyStock'), {
                type: 'line',
                data: {
                    labels: completeDates,
                    datasets: [{
                        label: 'Stock Quantity',
                        data: completeValues,
                        borderColor: '#3498db',
                        backgroundColor: 'rgba(52, 152, 219, 0.1)',
                        tension: 0,
                        fill: false,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    }]
                },
                options: getChartOptions(`Daily Stock Level - ${displayName}`, true)
            });
        }

        // Chart 4: Inventory Turnover
        function createTurnoverChart(inOutData, stockData, displayName) {
            if (inOutData.length === 0 || stockData.length === 0) return;

            const outData = inOutData.filter(row => row.category === 'Out');
            
            // Group out by month
            const monthlyOut = {};
            outData.forEach(row => {
                if (!monthlyOut[row.month]) monthlyOut[row.month] = 0;
                monthlyOut[row.month] += row.qty;
            });

            // Group stock by month
            const monthlyStock = {};
            stockData.forEach(row => {
                if (!monthlyStock[row.month]) monthlyStock[row.month] = [];
                monthlyStock[row.month].push(row.qty);
            });

            // Calculate average stock per month
            const avgStock = {};
            Object.keys(monthlyStock).forEach(month => {
                const values = monthlyStock[month];
                if (currentItem === 'All Item Code' || currentItem === 'All Item Name') {
                    // Sum for all items
                    avgStock[month] = values.reduce((a, b) => a + b, 0) / values.length;
                } else {
                    // Mean for individual item
                    avgStock[month] = values.reduce((a, b) => a + b, 0) / values.length;
                }
            });

            // Calculate turnover
            const months = Object.keys(monthlyOut).sort();
            const turnoverData = months.map(month => {
                const out = monthlyOut[month] || 0;
                const stock = avgStock[month] || 0;
                return stock > 0 ? out / stock : 0;
            });

            new Chart(document.getElementById('chartTurnover'), {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'Turnover Ratio',
                        data: turnoverData,
                        borderColor: '#9b59b6',
                        backgroundColor: 'rgba(155, 89, 182, 0.1)',
                        tension: 0,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    }]
                },
                options: getChartOptions(`Inventory Turnover (Monthly) - ${displayName}`, true)
            });
        }

        // Chart 5: Stock Aging (FIFO)
        function createAgingChart(data, displayName) {
            const inData = data.filter(row => row.category === 'In');
            const stockData = data.filter(row => row.category === 'Stock');

            if (inData.length === 0 || stockData.length === 0) return;

            let currentStock;
            if (currentItem === 'All Item Code' || currentItem === 'All Item Name') {
                // Group by owner and item, get last stock
                const grouped = {};
                stockData.forEach(row => {
                    const key = `${row.ownerCode}_${row.itemCode}`;
                    if (!grouped[key] || row.date > grouped[key].date) {
                        grouped[key] = row;
                    }
                });
                currentStock = Object.values(grouped);
            } else {
                // Get last stock record
                const sorted = [...stockData].sort((a, b) => b.date - a.date);
                currentStock = sorted.length > 0 ? [sorted[0]] : [];
            }

            const agingData = [];

            currentStock.forEach(stockRow => {
                let remainingQty = stockRow.qty;
                if (remainingQty <= 0) return;

                const stockDate = stockRow.date;

                // Filter IN transactions for this item
                let relevantIn;
                if (currentItem === 'All Item Code' || currentItem === 'All Item Name') {
                    relevantIn = inData.filter(row => 
                        row.ownerCode === stockRow.ownerCode && 
                        row.itemCode === stockRow.itemCode
                    );
                } else {
                    relevantIn = inData;
                }

                // Sort by date descending (FIFO - oldest first, but we match from newest)
                relevantIn = relevantIn.sort((a, b) => b.date - a.date);

                relevantIn.forEach(inRow => {
                    if (remainingQty <= 0) return;

                    const inQty = inRow.qty;
                    const useQty = Math.min(inQty, remainingQty);
                    remainingQty -= useQty;

                    const agingDays = Math.floor((stockDate - inRow.date) / (1000 * 60 * 60 * 24));

                    agingData.push({
                        qty: useQty,
                        agingDays: agingDays
                    });
                });
            });

            if (agingData.length === 0) return;

            // Create aging buckets (30-day intervals) - only for non-zero quantities
            const bucketSize = 30;
            const buckets = {};

            // Only create buckets when we have data (don't pre-create empty buckets)
            agingData.forEach(item => {
                const bucketIndex = Math.floor(item.agingDays / bucketSize);
                const label = `${bucketIndex * bucketSize + 1}-${(bucketIndex + 1) * bucketSize} days`;
                if (!buckets[label]) {
                    buckets[label] = 0;
                }
                buckets[label] += item.qty;
            });

            // Filter out zero-quantity buckets and sort by starting day
            const filteredBuckets = Object.entries(buckets)
                .filter(([label, qty]) => qty > 0)
                .sort((a, b) => {
                    const aStart = parseInt(a[0].split('-')[0]);
                    const bStart = parseInt(b[0].split('-')[0]);
                    return aStart - bStart;
                });

            const labels = filteredBuckets.map(([label, qty]) => label);
            const values = filteredBuckets.map(([label, qty]) => qty);

            new Chart(document.getElementById('chartAging'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Inventory Quantity',
                        data: values,
                        backgroundColor: '#e67e22'
                    }]
                },
                options: getChartOptions(`Stock Aging (FIFO) - ${displayName}`)
            });
        }

        // Generate AI Analysis
        function generateAIAnalysis(allData, displayName) {
            const container = document.getElementById('aiAnalysisContent');
            if (!container) {
                console.error('AI Analysis container not found');
                return;
            }
            
            try {
                console.log('Starting AI Analysis with', allData.length, 'rows');
                
                // Safety check
                if (!allData || allData.length === 0) {
                    container.innerHTML = '<div class="insight-text">No data available for analysis.</div>';
                    return;
                }
                
                // Get date range - simplified
                let maxDate = new Date(0);
                let minDate = new Date();
                
                allData.forEach(row => {
                    if (row.date && row.date instanceof Date && !isNaN(row.date)) {
                        if (row.date > maxDate) maxDate = row.date;
                        if (row.date < minDate) minDate = row.date;
                    }
                });
                
                if (maxDate.getTime() === 0 || minDate.getTime() === new Date().getTime()) {
                    container.innerHTML = '<div class="insight-text">Invalid date data in dataset.</div>';
                    return;
                }
                
                const twelveMonthsAgo = new Date(maxDate);
                twelveMonthsAgo.setMonth(maxDate.getMonth() - 12);
                
                console.log('Date range:', minDate, 'to', maxDate);
                
                // Calculate movement by item (last 12 months)
                const itemMovement = {};
                allData.forEach(row => {
                    if (!row.date || row.date < twelveMonthsAgo) return;
                    if (row.category !== 'In' && row.category !== 'Out') return;
                    
                    const key = currentItemType === 'code' ? (row.itemCode || 'Unknown') : (row.itemName || 'Unknown');
                    itemMovement[key] = (itemMovement[key] || 0) + (row.qty || 0);
                });
                
                console.log('Item movement calculated:', Object.keys(itemMovement).length, 'items');
                
                // Get latest stock per item
                const latestStock = {};
                allData.forEach(row => {
                    if (row.category !== 'Stock') return;
                    
                    const key = currentItemType === 'code' ? (row.itemCode || 'Unknown') : (row.itemName || 'Unknown');
                    
                    // Keep only if this is the first entry or a later date
                    if (!latestStock[key] || !latestStock[key].date || (row.date && row.date >= latestStock[key].date)) {
                        latestStock[key] = { qty: row.qty || 0, date: row.date };
                    }
                });
                
                console.log('Latest stock calculated:', Object.keys(latestStock).length, 'items');
                
                // Sort movement
                const movementArray = Object.entries(itemMovement)
                    .map(([name, qty]) => ({ name, qty }))
                    .sort((a, b) => b.qty - a.qty);
                
                // Analysis
                const allItemKeys = new Set([...Object.keys(itemMovement), ...Object.keys(latestStock)]);
                const totalItems = allItemKeys.size;
                const itemsWithStock = Object.values(latestStock).filter(s => s.qty > 0).length;
                const itemsWithoutStock = Object.keys(latestStock).length - itemsWithStock;
                
                const fastMovers = movementArray.slice(0, 10);
                const slowMovers = movementArray.length > 10 ? movementArray.slice(-10).reverse() : [];
                
                // Get top 10 items by balance stock
                const stockArray = Object.entries(latestStock)
                    .map(([name, data]) => ({ name, qty: data.qty }))
                    .filter(item => item.qty > 0)
                    .sort((a, b) => b.qty - a.qty);
                
                const topStock = stockArray.slice(0, 10);
                
                // Calculate percentages
                const totalMovement = movementArray.reduce((sum, item) => sum + item.qty, 0);
                const totalStockAllItems = stockArray.reduce((sum, item) => sum + item.qty, 0);
                
                // Stock Aging Analysis (FIFO) - Calculate overall totals
                const overallAgingBuckets = {
                    '0-30': 0,
                    '31-60': 0,
                    '61-90': 0,
                    '91-180': 0,
                    '180+': 0
                };
                
                const stockAgingByItem = {};
                allData.forEach(row => {
                    if (row.category !== 'Stock') return;
                    const key = currentItemType === 'code' ? (row.itemCode || 'Unknown') : (row.itemName || 'Unknown');
                    if (!stockAgingByItem[key]) {
                        stockAgingByItem[key] = { items: [], latestDate: null };
                    }
                    stockAgingByItem[key].items.push({ qty: row.qty || 0, date: row.date });
                    if (!stockAgingByItem[key].latestDate || row.date > stockAgingByItem[key].latestDate) {
                        stockAgingByItem[key].latestDate = row.date;
                    }
                });
                
                // Calculate aging buckets for all items with stock
                Object.entries(stockAgingByItem).forEach(([itemName, data]) => {
                    const latestStock = data.items[data.items.length - 1];
                    if (!latestStock || latestStock.qty <= 0) return;
                    
                    const stockDate = data.latestDate;
                    const inTransactions = allData.filter(row => {
                        const key = currentItemType === 'code' ? (row.itemCode || 'Unknown') : (row.itemName || 'Unknown');
                        return key === itemName && row.category === 'In';
                    }).sort((a, b) => b.date - a.date);
                    
                    let remainingQty = latestStock.qty;
                    inTransactions.forEach(inRow => {
                        if (remainingQty <= 0) return;
                        
                        const useQty = Math.min(inRow.qty || 0, remainingQty);
                        const agingDays = Math.floor((stockDate - inRow.date) / (1000 * 60 * 60 * 24));
                        
                        if (agingDays <= 30) overallAgingBuckets['0-30'] += useQty;
                        else if (agingDays <= 60) overallAgingBuckets['31-60'] += useQty;
                        else if (agingDays <= 90) overallAgingBuckets['61-90'] += useQty;
                        else if (agingDays <= 180) overallAgingBuckets['91-180'] += useQty;
                        else overallAgingBuckets['180+'] += useQty;
                        
                        remainingQty -= useQty;
                    });
                });
                
                const totalAgingStock = Object.values(overallAgingBuckets).reduce((sum, qty) => sum + qty, 0);
                
                // Dead Stock Analysis - No movement for 365+ days
                const oneYearAgo = new Date(maxDate);
                oneYearAgo.setDate(oneYearAgo.getDate() - 365);
                
                const itemLastMovement = {};
                allData.forEach(row => {
                    if (row.category !== 'In' && row.category !== 'Out') return;
                    const key = currentItemType === 'code' ? (row.itemCode || 'Unknown') : (row.itemName || 'Unknown');
                    
                    if (!itemLastMovement[key] || row.date > itemLastMovement[key]) {
                        itemLastMovement[key] = row.date;
                    }
                });
                
                const deadStockItems = [];
                Object.entries(latestStock).forEach(([itemName, data]) => {
                    if (data.qty <= 0) return;
                    
                    const lastMovement = itemLastMovement[itemName];
                    
                    // If no movement found or last movement was over 365 days ago
                    if (!lastMovement || lastMovement < oneYearAgo) {
                        const daysSinceMovement = lastMovement ? 
                            Math.floor((maxDate - lastMovement) / (1000 * 60 * 60 * 24)) : 
                            999; // No movement found
                        
                        deadStockItems.push({
                            name: itemName,
                            qty: data.qty,
                            daysSinceMovement: daysSinceMovement,
                            lastMovement: lastMovement
                        });
                    }
                });
                
                // Sort by quantity descending and get top 10
                deadStockItems.sort((a, b) => b.qty - a.qty);
                const topDeadStock = deadStockItems.slice(0, 10);
                const totalDeadStockQty = deadStockItems.reduce((sum, item) => sum + item.qty, 0);
                
                // Items with no stock but had demand
                const stockoutWithDemand = [];
                movementArray.forEach(item => {
                    if (latestStock[item.name] && latestStock[item.name].qty <= 0 && stockoutWithDemand.length < 10) {
                        stockoutWithDemand.push(item);
                    }
                });
                
                // Total stock value
                let totalStockQty = 0;
                Object.values(latestStock).forEach(s => {
                    totalStockQty += (s.qty || 0);
                });
                
                const daysDiff = Math.round((maxDate.getTime() - minDate.getTime()) / (1000 * 60 * 60 * 24));
                
                console.log('Analysis complete - generating HTML');
                
                // Generate HTML
                let html = `
                    <div class="insight-section">
                        <div class="insight-title">📊 Overview</div>
                        <div class="insight-text">
                            I've analyzed your inventory data spanning <span class="highlight-number">${daysDiff}</span> days
                            from ${minDate.toLocaleDateString()} to ${maxDate.toLocaleDateString()}.
                            You're managing <span class="highlight-number">${totalItems}</span> items with a total current stock of 
                            <span class="highlight-number">${totalStockQty.toLocaleString()}</span> units.
                        </div>
                        <div class="insight-text">
                            Stock Status: <span class="highlight-success">${itemsWithStock} items in stock</span>, 
                            <span class="highlight-critical">${itemsWithoutStock} items out of stock</span>.
                        </div>
                    </div>
                `;
                
                // Fast movers
                if (fastMovers.length > 0) {
                    const fastMoversTotal = fastMovers.reduce((sum, item) => sum + item.qty, 0);
                    const fastMoversPercent = totalMovement > 0 ? (fastMoversTotal / totalMovement * 100).toFixed(1) : 0;
                    
                    html += `
                        <div class="insight-section">
                            <div class="insight-title">🚀 Fast-Moving Items (Last 12 Months)</div>
                            <div class="insight-text">
                                These are your star performers with the highest activity. 
                                Top ${fastMovers.length} represent <span class="highlight-number">${fastMoversPercent}%</span> of total movement 
                                (<span class="highlight-number">${fastMoversTotal.toLocaleString()}</span> of ${totalMovement.toLocaleString()} units).
                            </div>
                            <div class="item-list">
                                ${fastMovers.map((item, i) => {
                                    const percent = totalMovement > 0 ? (item.qty / totalMovement * 100).toFixed(1) : 0;
                                    return `<div class="item-list-item">${i + 1}. <strong>${item.name}</strong> - ${item.qty.toLocaleString()} units (<span class="highlight-success">${percent}%</span>)</div>`;
                                }).join('')}
                            </div>
                            <div class="insight-recommendation">
                                Ensure adequate safety stock for these high-velocity items to prevent stockouts. Consider negotiating better pricing with suppliers given the volume.
                            </div>
                        </div>
                    `;
                }
                
                // Slow movers
                if (slowMovers.length > 0) {
                    const slowMoversTotal = slowMovers.reduce((sum, item) => sum + item.qty, 0);
                    const slowMoversPercent = totalMovement > 0 ? (slowMoversTotal / totalMovement * 100).toFixed(1) : 0;
                    
                    html += `
                        <div class="insight-section">
                            <div class="insight-title">🐌 Slow-Moving Items (Last 12 Months)</div>
                            <div class="insight-text">
                                These items have minimal activity and may tie up capital. 
                                Bottom ${slowMovers.length} represent only <span class="highlight-critical">${slowMoversPercent}%</span> of total movement 
                                (<span class="highlight-number">${slowMoversTotal.toLocaleString()}</span> of ${totalMovement.toLocaleString()} units).
                            </div>
                            <div class="item-list">
                                ${slowMovers.map((item, i) => {
                                    const percent = totalMovement > 0 ? (item.qty / totalMovement * 100).toFixed(2) : 0;
                                    return `<div class="item-list-item">${i + 1}. <strong>${item.name}</strong> - Only ${item.qty.toLocaleString()} units (<span class="highlight-critical">${percent}%</span>)</div>`;
                                }).join('')}
                            </div>
                            <div class="insight-recommendation">
                                Review if these items are still needed. Consider reducing stock levels or discontinuing slow movers to free up warehouse space and capital.
                            </div>
                        </div>
                    `;
                }
                
                // Top 10 Balance Stock
                if (topStock.length > 0) {
                    const topStockTotal = topStock.reduce((sum, item) => sum + item.qty, 0);
                    const topStockPercent = totalStockAllItems > 0 ? (topStockTotal / totalStockAllItems * 100).toFixed(1) : 0;
                    
                    html += `
                        <div class="insight-section">
                            <div class="insight-title">📦 Top 10 Items by Balance Stock</div>
                            <div class="insight-text">
                                These items hold the most inventory value. 
                                Top ${topStock.length} represent <span class="highlight-number">${topStockPercent}%</span> of total stock 
                                (<span class="highlight-number">${topStockTotal.toLocaleString()}</span> of ${totalStockAllItems.toLocaleString()} units).
                            </div>
                            <div class="item-list">
                                ${topStock.map((item, i) => {
                                    const percent = totalStockAllItems > 0 ? (item.qty / totalStockAllItems * 100).toFixed(1) : 0;
                                    return `<div class="item-list-item">${i + 1}. <strong>${item.name}</strong> - ${item.qty.toLocaleString()} units in stock (<span class="highlight-number">${percent}%</span>)</div>`;
                                }).join('')}
                            </div>
                            <div class="insight-recommendation">
                                Monitor these high-value items closely. Consider ABC analysis to optimize inventory investment. High stock levels may indicate overordering or declining demand.
                            </div>
                        </div>
                    `;
                }
                
                // Stock Aging Analysis - Overall Totals
                if (totalStockQty > 0) {
                    html += `
                        <div class="insight-section">
                            <div class="insight-title">⏳ Stock Aging Analysis (FIFO)</div>
                            <div class="insight-text">
                                Age distribution of your entire current inventory. Total stock analyzed: <span class="highlight-number">${totalStockQty.toLocaleString()}</span> units.
                            </div>
                            <div class="item-list">
                                ${Object.entries(overallAgingBuckets)
                                    .filter(([bucket, qty]) => qty > 0)
                                    .map(([bucket, qty]) => {
                                        const percent = totalStockQty > 0 ? (qty / totalStockQty * 100).toFixed(1) : 0;
                                        const color = bucket === '0-30' ? 'highlight-success' : 
                                                     bucket === '31-60' ? 'highlight-number' :
                                                     bucket === '61-90' ? 'highlight-number' : 
                                                     'highlight-critical';
                                        const days = bucket === '180+' ? '180+ Days' : `${bucket} Days`;
                                        return `<div class="item-list-item"><strong>${days}</strong>: <span class="${color}">${qty.toLocaleString()} units (${percent}%)</span></div>`;
                                    }).join('')}
                            </div>
                            ${Object.values(overallAgingBuckets).reduce((sum, qty) => sum + qty, 0) < totalStockQty ? 
                                `<div class="insight-text" style="font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 10px;">
                                    Note: ${(totalStockQty - Object.values(overallAgingBuckets).reduce((sum, qty) => sum + qty, 0)).toLocaleString()} units could not be traced to In transactions (may be opening stock).
                                </div>` : ''}
                            <div class="insight-recommendation">
                                ${overallAgingBuckets['180+'] > 0 ? 
                                    `<span class="highlight-critical">ALERT:</span> ${overallAgingBuckets['180+'].toLocaleString()} units (${(overallAgingBuckets['180+'] / totalStockQty * 100).toFixed(1)}%) are over 180 days old! Consider markdowns or promotions to clear old stock.` :
                                    'Good aging profile. Most stock is fresh. Continue monitoring to maintain healthy inventory turnover.'}
                            </div>
                        </div>
                    `;
                }
                
                // Dead Stock - No movement for 365+ days
                if (topDeadStock.length > 0) {

                    html += `
                        <div class="insight-section">
                            <div class="insight-title">💀 Dead Stock Alert (No Movement 365+ Days)</div>

                                    const lastMoveText = item.lastMovement ?

                                    return `<div class="item-list-item">

                            </div>

                // Critical: Stockout with demand
                if (stockoutWithDemand.length > 0) {
                    html += `

                            <div class="insight-text">
                                <span class="highlight-critical">URGENT ATTENTION NEEDED!</span> These items are currently out of stock but had significant movement in the last 12 months:
                            </div>
                            <div class="item-list">
                                ${stockoutWithDemand.map((item, i) => 
                                    `<div class="item-list-item">${i + 1}. <span class="highlight-critical">${item.name}</span> - ${item.qty.toLocaleString()} units moved (Currently: 0 in stock)</div>`
                                ).join('')}
                            </div>
                            <div class="insight-recommendation">
                                <strong>IMMEDIATE ACTION:</strong> Expedite purchase orders for these items. You're likely losing sales and customer satisfaction. Set up automatic reorder points to prevent future stockouts.
                            </div>
                        </div>
                    `;

                // Overall recommendation
                html += `

                            4. <strong>Set Reorder Points:</strong> Implement automated reorder triggers based on historical demand patterns.<br>
                            5. <strong>Regular Reviews:</strong> Conduct monthly ABC analysis to continuously optimize inventory levels.
                        </div>
                    </div>
                `;
                
                container.innerHTML = html;
                console.log('AI Analysis rendered successfully');
                
            } catch (error) {

                container.innerHTML = `<div class="insight-text">Error generating analysis: ${error.message}<br><small>Check browser console (F12) for details.</small></div>`;

                        ticks: {
                            color: 'white',
                            autoSkip: false,
                            maxRotation: 0,
                            minRotation: 0,
                            callback: function(value, index, ticks) {
                                if (showOnlyYear) {
                                    const label = this.getLabelForValue(value);
                                    // Extract year from date string (YYYY-MM-DD or YYYY-MM format)
                                    const year = label.split('-')[0];
                                    
                                    // Show year at the first occurrence and then once per year
                                    if (index === 0) {
                                        return year;
                                    }
                                    
                                    const prevLabel = this.getLabelForValue(ticks[index - 1].value);
                                    const prevYear = prevLabel.split('-')[0];
                                    
                                    if (year !== prevYear) {
                                        return year;
                                    }
                                    return '';
                                }
                                return this.getLabelForValue(value);
                            }
                        },
                        grid: {
                            display: false
                        },
                        border: {
                            color: 'rgba(255, 255, 255, 0.8)',
                            width: 2
                        }
                    },
                    y: {
                        ticks: {
                            color: 'white'
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.5)',
                            lineWidth: 2
                        },
                        border: {
                            color: 'rgba(255, 255, 255, 0.8)',
                            width: 2
                        }
                    }
                }
            };
        }
        
        // Analytics: Track session duration and user activity
        let sessionStartTime = Date.now();
        let lastActivityTime = Date.now();
        let isActive = true;
        
        // Track user activity
        ['mousedown', 'keydown', 'scroll', 'touchstart'].forEach(event => {
            document.addEventListener(event, () => {
                lastActivityTime = Date.now();
                if (!isActive) {
                    isActive = true;
                    sessionStartTime = Date.now();
                }
            }, true);
        });
        
        // Check for inactivity (5 minutes)
        setInterval(() => {
            if (Date.now() - lastActivityTime > 5 * 60 * 1000) {
                isActive = false;
            }
        }, 60000);
        
        // Track session end
        window.addEventListener('beforeunload', () => {
            if (typeof gtag !== 'undefined' && isActive) {
                const duration = Math.round((Date.now() - sessionStartTime) / 1000);
                gtag('event', 'session_end', {
                    'event_category': 'engagement',
                    'event_label': 'time_on_site',
                    'value': duration
                });
            }
        });
        
        // Function to close sample banner
        function closeSampleBanner() {
            const banner = document.getElementById('sampleBanner');
            if (banner) {
                banner.classList.add('fade-out');
                setTimeout(() => {
                    banner.style.display = 'none';
                    banner.classList.remove('show', 'fade-out');
                }, 1500);
            }
        }
        
        // Sample Data Banner - Delay 1s, show for 5s, then fade out
        window.addEventListener('load', () => {
            const banner = document.getElementById('sampleBanner');
            if (banner) {
                // Wait 1 second before showing (let data load)
                setTimeout(() => {
                    banner.classList.add('show');
                    
                    // Display for 5 seconds
                    setTimeout(() => {
                        // Start fade out
                        banner.classList.add('fade-out');
                        
                        // Remove from DOM after fade completes (1.5s transition)
                        setTimeout(() => {
                            banner.style.display = 'none';
                            banner.classList.remove('show', 'fade-out');
                        }, 1500);
                    }, 5000);
                }, 1000);
            }
        });
    </script>
</body>
</html>
